short_bio: >-
  <p>
    I am J. Xiong, a Research Postgraduate within the Smart Manufacturing (SMMG) thrust of the Systems Hub at
    <a href="https://www.hkust-gz.edu.cn/" target="_blank">The Hong Kong University of Science and Technology (Guangzhou)</a>.
    I am supervised by <a href="https://scholar.google.com/citations?user=3auvsZQAAAAJ&amp;hl=en" target="_blank">Dr. Guo Daqiang</a>.
  </p>
  <p>
    My research focuses on human-centric manufacturing, human-robot collaboration, human factors and ergonomics,
    and the human-centric adaptation of robotics. My current work studies the physiological states of human operators
    to support safer, more efficient, and more adaptive human-robot collaboration.
  </p>
  <p>Please feel free to contact me by email for discussion, collaboration, or further information.</p>

